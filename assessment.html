
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COBSAG Module</title>

<style>

body{
font-family:Segoe UI;
background:#f3f3f3;
text-align:center;
padding:40px;
}

h1{
color:#2bb673;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,220px);
justify-content:center;
gap:40px;
}

.card{
width:220px;
height:180px;
background:#343a8f;
color:white;
display:flex;
align-items:flex-end;
justify-content:center;
border-radius:15px;
font-size:18px;
padding-bottom:15px;
text-decoration:none;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
background:#2b2f75;
}

.center{
grid-column:span 2;
display:flex;
justify-content:center;
}
/* Back button */

.back-btn{
position:fixed;
bottom:20px;
right:20px;
width:50px;
height:50px;
background:#2bb673;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
text-decoration:none;
box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

.back-btn:hover{
background:#249a5e;
}

</style>
</head>

<body>

<h1>Welcome to our COBSAG module</h1>

<div class="grid">

<a href="biology.html" class="card">
Biology
</a>

<a href="physics.html" class="card">
Physics
</a>

<div class="center">
<a href="chemistry.html" class="card">
Chemistry
</a>
</div>

</div>

<!-- Back Icon -->
<a href="dashboard.html" class="back-btn">←</a>

</body>
</html>
